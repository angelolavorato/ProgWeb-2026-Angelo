    <h2>Falsy e Truthy</h2>
    <h3>Definições</h3>
    <p><strong>Falsy: </strong> quando um valor é considerado false (falso)</p>
    <p>
      <strong>Truthy: </strong> quando um valor é considerado true (verdadeiro)
      em contextos onde um boolean é obrigatório (condicionais e loops)
    </p>
