<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Case Sensitive</title>
  </head>
  <body>
    <h1>JavaScript é Case Sensitive</h1>
    <p>
      Quando uma linguagem de programação é case sensitive, isso significa que
      letras maiúsculas e minúsculas são tratadas como diferentes.
    </p>
    <p>
      por exemplo: <br />
      var nome = "João"; <br>
      e 
      <br>var Nome = "Maria"; são variáveis diferentes.
    </p>
    <script src="scripts.js"></script>
  </body>
</html>
